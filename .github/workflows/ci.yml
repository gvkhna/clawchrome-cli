name: ci

on:
  push:
    branches:
      - main
      - master
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clawchrome-cli-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      GOWORK: off

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.15.2
          install-only: true

      - name: Download modules
        run: go mod download

      - name: Verify module metadata
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/clawchrome-cli

      - name: Validate GoReleaser config
        run: goreleaser check

      - name: Build snapshot release artifacts
        run: goreleaser release --snapshot --clean --skip=publish
