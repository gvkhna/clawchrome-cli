version: 2

project_name: clawchrome-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: linux-and-windows
    main: ./cmd/clawchrome-cli
    binary: clawchrome-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gvkhna/clawchrome-cli/internal/cli.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: darwin-amd64
    main: ./cmd/clawchrome-cli
    binary: clawchrome-cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gvkhna/clawchrome-cli/internal/cli.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: darwin-arm64
    main: ./cmd/clawchrome-cli
    binary: clawchrome-cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/gvkhna/clawchrome-cli/internal/cli.Version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

universal_binaries:
  - id: darwin-universal
    ids:
      - darwin-amd64
      - darwin-arm64
    replace: true
    name_template: clawchrome-cli

archives:
  - id: release-archives
    ids:
      - linux-and-windows
      - darwin-universal
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ if eq .Os "darwin" }}darwin_universal{{ else }}{{ .Os }}_{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
